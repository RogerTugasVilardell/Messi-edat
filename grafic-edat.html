<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gràfic de tendència per edat: Messi vs. Cristiano Ronaldo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --messi: #0E97B7;
      --cristiano: #CE2B37;
      --neutral-soft: #EEF1F4;
      --dark: #252552;
      --ink: #1A1C1F;
      --ink-soft: #50575E;
      --line: #E4E2DC;
      --font-head: 'Archivo', system-ui, sans-serif;
      --font-body: 'Source Serif 4', Georgia, serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0 auto;
      padding: 0;
      max-width: 720px;
      background: transparent;
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 1.18rem;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    .bc__note {
      font-family: var(--font-head);
      font-size: 0.82rem;
      color: var(--ink-soft);
      line-height: 1.4;
      margin: 1rem 0 0;
    }
  </style>
</head>
<body>
  <div id="chart-age"></div>

  <script>
  (function () {
    'use strict';

    function ageChart() {
      var root = document.getElementById('chart-age');
      if (!root) return;

      var groups = [
        { label: 'Joves',         zeroPct: 0.46,  messiOpa: 0.82, cr7Opa: 0.82 },
        { label: 'Mitjana\nedat', zeroPct: 0.375, messiOpa: 0.48, cr7Opa: 0.50 },
        { label: 'Grans',         zeroPct: 0.125, messiOpa: 0.12, cr7Opa: 0.26 }
      ];

      var isMobile = window.innerWidth < 640;
      var VW    = isMobile ? 340  : 560;
      var LW    = isMobile ? 78   : 110;
      var GAP   = isMobile ? 12   : 16;
      var BARW  = VW - LW - GAP;
      var BAR_X = LW + GAP;
      var axFz  = isMobile ? 13 : 12;
      var lblFz = isMobile ? 16 : 15;
      var BAR_H = 32, ROW_H = 82, PAD_B = 32;
      var PAD_T = isMobile ? 52 : 58;
      var VH = PAD_T + groups.length * ROW_H + PAD_B;
      var CENTER_X = BAR_X + BARW * 0.5;
      var MC = '#0E97B7', CC = '#CE2B37', INK = '#1A1C1F', DARK = '#252552', NEUT = '#EEF1F4';

      var p = [];
      p.push('<svg viewBox="0 0 ' + VW + ' ' + VH + '" xmlns="http://www.w3.org/2000/svg"'
        + ' style="width:100%;height:auto;display:block"'
        + ' role="img" aria-label="Efecte de la ideologia sobre la preferència Messi-Cristiano Ronaldo per franja d\'edat">');

      p.push('<defs>');
      groups.forEach(function (g, i) {
        var zp = (g.zeroPct * 100).toFixed(2);
        p.push('<linearGradient id="age-g' + i + '" x1="0%" y1="0%" x2="100%" y2="0%">');
        p.push('<stop offset="0%" stop-color="' + MC + '" stop-opacity="' + g.messiOpa.toFixed(2) + '"/>');
        p.push('<stop offset="' + zp + '%" stop-color="' + MC + '" stop-opacity="0"/>');
        p.push('<stop offset="' + zp + '%" stop-color="' + CC + '" stop-opacity="0"/>');
        p.push('<stop offset="100%" stop-color="' + CC + '" stop-opacity="' + g.cr7Opa.toFixed(2) + '"/>');
        p.push('</linearGradient>');
      });
      p.push('</defs>');

      if (!isMobile) {
        var dotY = 14, dotR = 5;
        p.push('<circle cx="' + (BAR_X + 19) + '" cy="' + dotY + '" r="' + dotR + '" fill="' + MC + '"/>');
        p.push('<text x="' + (BAR_X + 29) + '" y="' + dotY + '" dominant-baseline="central"'
          + ' font-family="Archivo,system-ui,sans-serif" font-weight="700" font-size="' + axFz + '" fill="' + MC + '">'
          + 'Preferència per Messi</text>');
        var rdot = BAR_X + BARW - 19;
        p.push('<circle cx="' + rdot + '" cy="' + dotY + '" r="' + dotR + '" fill="' + CC + '"/>');
        p.push('<text x="' + (rdot - 9) + '" y="' + dotY + '" dominant-baseline="central" text-anchor="end"'
          + ' font-family="Archivo,system-ui,sans-serif" font-weight="700" font-size="' + axFz + '" fill="' + CC + '">'
          + 'Preferència per Cristiano Ronaldo</text>');
      } else {
        var mDotCy = 19, mDotR = 4, mY1 = 13, mY2 = 27;
        p.push('<circle cx="' + (BAR_X + 8) + '" cy="' + mDotCy + '" r="' + mDotR + '" fill="' + MC + '"/>');
        p.push('<text x="' + (BAR_X + 17) + '" y="' + mY1 + '"'
          + ' font-family="Archivo,system-ui,sans-serif" font-weight="700" font-size="' + axFz + '" fill="' + MC + '">'
          + 'Preferència</text>');
        p.push('<text x="' + (BAR_X + 17) + '" y="' + mY2 + '"'
          + ' font-family="Archivo,system-ui,sans-serif" font-weight="700" font-size="' + axFz + '" fill="' + MC + '">'
          + 'per Messi</text>');
        var mRdot = BAR_X + BARW - 8;
        p.push('<circle cx="' + mRdot + '" cy="' + mDotCy + '" r="' + mDotR + '" fill="' + CC + '"/>');
        p.push('<text x="' + (mRdot - 17) + '" y="' + mY1 + '" text-anchor="end"'
          + ' font-family="Archivo,system-ui,sans-serif" font-weight="700" font-size="' + axFz + '" fill="' + CC + '">'
          + 'Preferència per</text>');
        p.push('<text x="' + (mRdot - 17) + '" y="' + mY2 + '" text-anchor="end"'
          + ' font-family="Archivo,system-ui,sans-serif" font-weight="700" font-size="' + axFz + '" fill="' + CC + '">'
          + 'Ronaldo</text>');
      }

      var axY = isMobile ? 48 : 44;
      p.push('<text x="' + BAR_X + '" y="' + axY + '" text-anchor="start"'
        + ' font-family="Archivo,system-ui,sans-serif" font-weight="700" font-size="' + axFz + '" fill="' + INK + '">'
        + '◀ Progressistes</text>');
      p.push('<text x="' + (BAR_X + BARW) + '" y="' + axY + '" text-anchor="end"'
        + ' font-family="Archivo,system-ui,sans-serif" font-weight="700" font-size="' + axFz + '" fill="' + INK + '">'
        + 'Conservadors ▶</text>');

      groups.forEach(function (g, i) {
        var cy    = PAD_T + i * ROW_H + ROW_H / 2;
        var zeroX = BAR_X + g.zeroPct * BARW;
        var lnOff = isMobile ? 10 : 9;

        if (i > 0) {
          p.push('<line x1="' + (LW - 4) + '" y1="' + (cy - ROW_H / 2) + '" x2="' + (VW - 4) + '" y2="' + (cy - ROW_H / 2) + '"'
            + ' stroke="' + INK + '" stroke-width="0.5" stroke-opacity="0.08"/>');
        }

        if (g.label.indexOf('\n') >= 0) {
          var pts = g.label.split('\n');
          p.push('<text x="' + (LW - 8) + '" y="' + (cy - lnOff) + '" text-anchor="end"'
            + ' font-family="Archivo,system-ui,sans-serif" font-weight="700" font-size="' + lblFz + '" fill="' + INK + '">' + pts[0] + '</text>');
          p.push('<text x="' + (LW - 8) + '" y="' + (cy + lnOff) + '" text-anchor="end"'
            + ' font-family="Archivo,system-ui,sans-serif" font-weight="700" font-size="' + lblFz + '" fill="' + INK + '">' + pts[1] + '</text>');
        } else {
          p.push('<text x="' + (LW - 8) + '" y="' + cy + '" text-anchor="end" dominant-baseline="central"'
            + ' font-family="Archivo,system-ui,sans-serif" font-weight="700" font-size="' + lblFz + '" fill="' + INK + '">' + g.label + '</text>');
        }

        p.push('<rect x="' + BAR_X + '" y="' + (cy - BAR_H / 2) + '" width="' + BARW + '" height="' + BAR_H + '"'
          + ' fill="' + NEUT + '" rx="4"/>');
        p.push('<rect x="' + BAR_X + '" y="' + (cy - BAR_H / 2) + '" width="' + BARW + '" height="' + BAR_H + '"'
          + ' fill="url(#age-g' + i + ')" rx="4"/>');
        p.push('<line x1="' + zeroX + '" y1="' + (cy - BAR_H / 2 - 4) + '" x2="' + zeroX + '" y2="' + (cy + BAR_H / 2 + 4) + '"'
          + ' stroke="' + DARK + '" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="3 3"/>');
      });

      p.push('<line x1="' + CENTER_X + '" y1="' + (PAD_T - 6) + '" x2="' + CENTER_X + '" y2="' + (VH - PAD_B + 4) + '"'
        + ' stroke="' + DARK + '" stroke-width="1.5" stroke-opacity="0.40"/>');

      p.push('</svg>');

      root.innerHTML = p.join('');
    }

    ageChart();
  })();
  </script>
  <script>
    (function () {
      var lastH = 0;
      function send() {
        var h = document.body.scrollHeight;
        if (h > 0 && h !== lastH) { lastH = h; window.parent.postMessage({ height: h }, '*'); }
      }
      window.addEventListener('load', send);
      var el = document.body.firstElementChild;
      if (el && window.ResizeObserver) new ResizeObserver(send).observe(el);
    })();
  </script>
</body>
</html>
